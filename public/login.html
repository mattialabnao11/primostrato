<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accesso — 3D Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0e10;
      --bg2:     #13151a;
      --bg3:     #1a1d24;
      --border:  #2a2e3a;
      --border2: #353a48;
      --text:    #e8eaf0;
      --text2:   #9299ab;
      --text3:   #5c6375;
      --accent:  #10d98a;
      --accent2: #34e8a0;
      --accent3: #07b570;
      --red:     #ff4757;
      --mono:    'Space Mono', monospace;
      --sans:    'Syne', sans-serif;
      --radius:  6px;
      --radius2: 12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }

    /* Grid pattern bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(16,217,138,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16,217,138,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glow */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(16,217,138,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius2);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
    }

    .logo-img {
      width: 160px;
      height: auto;
      /* Logo è nero su nero → invertito diventa bianco su bianco
         usiamo un trucco: drop-shadow verde + brightness per renderlo visibile */
      filter: invert(1) brightness(10);
      opacity: 0.92;
    }

    .logo-sub {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--text3);
      text-transform: uppercase;
    }

    .tab-row {
      display: none; /* visibile solo se setup */
      gap: 0;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3px;
      margin-bottom: 28px;
    }

    .tab-row.visible { display: flex; }

    .tab-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      border-radius: calc(var(--radius) - 2px);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #000;
    }

    h2 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    h2 span { color: var(--accent); }

    .subtitle {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text3);
      margin-bottom: 28px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    input {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.15s ease;
      width: 100%;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(16,217,138,0.1);
    }

    input::placeholder { color: var(--text3); }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover {
      background: var(--accent2);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(16,217,138,0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .error-box {
      background: rgba(255,71,87,0.1);
      border: 1px solid rgba(255,71,87,0.25);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
      font-family: var(--mono);
      margin-bottom: 16px;
      display: none;
    }

    .error-box.visible { display: block; }

    .hint {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--mono);
      margin-top: 16px;
      text-align: center;
      line-height: 1.6;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .strength-bar {
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      margin-top: 6px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.2s ease, background 0.2s ease;
      width: 0%;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">

      <div class="logo-wrap">
        <img src="logo.png" alt="Logo" class="logo-img">
        <span class="logo-sub">3D Manager</span>
      </div>

      <!-- Tab login/setup (visibile solo al primo avvio) -->
      <div class="tab-row" id="tab-row">
        <button class="tab-btn active" onclick="showTab('login')">Accedi</button>
        <button class="tab-btn" onclick="showTab('setup')">Primo accesso</button>
      </div>

      <!-- ── LOGIN ── -->
      <div id="panel-login">
        <h2>Ben<span>venuto</span></h2>
        <div class="subtitle">// inserisci le tue credenziali</div>

        <div class="error-box" id="login-error"></div>

        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-user" placeholder="il tuo username" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"
            onkeydown="if(event.key==='Enter') doLogin()">
        </div>

        <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Accedi</button>
      </div>

      <!-- ── SETUP (primo avvio) ── -->
      <div id="panel-setup" style="display:none">
        <h2>Primo <span>Accesso</span></h2>
        <div class="subtitle">// crea il tuo account amministratore</div>

        <div class="error-box" id="setup-error"></div>

        <div class="form-group">
          <label>Username</label>
          <input type="text" id="setup-user" placeholder="scegli uno username" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="setup-pass" placeholder="minimo 8 caratteri" autocomplete="new-password"
            oninput="updateStrength(this.value)">
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        </div>
        <div class="form-group">
          <label>Conferma Password</label>
          <input type="password" id="setup-pass2" placeholder="ripeti la password" autocomplete="new-password"
            onkeydown="if(event.key==='Enter') doSetup()">
        </div>

        <button class="btn btn-primary" id="setup-btn" onclick="doSetup()">Crea Account</button>
        <div class="hint">La password viene salvata in modo sicuro con bcrypt.<br>Non è recuperabile: ricordatela bene.</div>
      </div>

    </div>
  </div>

  <script>
    let currentTab = 'login';

    // Controlla se è il primo avvio
    (async () => {
      try {
        const r = await fetch('/api/auth/status');
        const d = await r.json();
        if (d.setup_required) {
          // Mostra il tab e porta a setup
          document.getElementById('tab-row').classList.add('visible');
          showTab('setup');
        }
      } catch {}
    })();

    function showTab(tab) {
      currentTab = tab;
      document.getElementById('panel-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('panel-setup').style.display = tab === 'setup' ? 'block' : 'none';
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'setup'));
      });
      clearErrors();
    }

    function clearErrors() {
      ['login-error', 'setup-error'].forEach(id => {
        const el = document.getElementById(id);
        el.textContent = '';
        el.classList.remove('visible');
      });
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('visible');
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Attendere…';
      } else {
        btn.disabled = false;
        btn.innerHTML = btnId === 'login-btn' ? 'Accedi' : 'Crea Account';
      }
    }

    function updateStrength(val) {
      const fill = document.getElementById('strength-fill');
      let score = 0;
      if (val.length >= 8)  score++;
      if (val.length >= 12) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const colors = ['#ff4757','#ff4757','#ffd32a','#ffd32a','#10d98a','#10d98a'];
      fill.style.width  = (score / 5 * 100) + '%';
      fill.style.background = colors[score] || '#ff4757';
    }

    async function doLogin() {
      clearErrors();
      const username = document.getElementById('login-user').value.trim();
      const password = document.getElementById('login-pass').value;
      if (!username || !password) return showError('login-error', 'Compila tutti i campi');

      setLoading('login-btn', true);
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const d = await r.json();
        if (!r.ok) return showError('login-error', d.error || 'Errore di accesso');
        localStorage.setItem('3dm_token', d.token);
        localStorage.setItem('3dm_user', d.username);
        window.location.href = '/';
      } catch {
        showError('login-error', 'Errore di connessione al server');
      } finally {
        setLoading('login-btn', false);
      }
    }

    async function doSetup() {
      clearErrors();
      const username = document.getElementById('setup-user').value.trim();
      const password = document.getElementById('setup-pass').value;
      const pass2    = document.getElementById('setup-pass2').value;

      if (!username || !password) return showError('setup-error', 'Compila tutti i campi');
      if (password.length < 8)    return showError('setup-error', 'Password minimo 8 caratteri');
      if (password !== pass2)     return showError('setup-error', 'Le password non coincidono');

      setLoading('setup-btn', true);
      try {
        const r = await fetch('/api/auth/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const d = await r.json();
        if (!r.ok) return showError('setup-error', d.error || 'Errore setup');

        // Setup ok → login automatico
        const r2 = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const d2 = await r2.json();
        localStorage.setItem('3dm_token', d2.token);
        localStorage.setItem('3dm_user', d2.username);
        window.location.href = '/';
      } catch {
        showError('setup-error', 'Errore di connessione al server');
      } finally {
        setLoading('setup-btn', false);
      }
    }
  </script>
</body>
</html>
